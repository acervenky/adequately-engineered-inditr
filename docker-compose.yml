name: inditr

# ── LLM routing ───────────────────────────────────────────────────────────────
# Default (no profile): api + frontend only.
#   Uses whatever LLM_* vars are in your .env (OpenRouter, DeepInfra, etc.)
#   docker compose up
#
# Local Ollama profile: also starts the Ollama container + model pull helper.
#   docker compose --profile local up
#   docker compose --profile local run model-init   # pull models once
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # LLM — read from .env. Default falls back to local Ollama if nothing set.
      LLM_BASE_URL:     ${LLM_BASE_URL:-}
      LLM_API_KEY:      ${LLM_API_KEY:-ollama}
      LLM_MODEL:        ${LLM_MODEL:-ollama/qwen2.5:latest}
      LLM_VISION_MODEL: ${LLM_VISION_MODEL:-ollama/llava:latest}
      # Storage — written inside the app_data volume
      SQLITE_DB_PATH:   /data/sessions.db
      PDF_OUTPUT_DIR:   /data/outputs
      RAG_INDEX_PATH:   /data/rag_index
    volumes:
      - app_data:/data
    depends_on:
      ollama:
        condition: service_started
        required: false   # skip gracefully when ollama isn't in the active profile
    restart: unless-stopped

  # ── Static frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    image: nginx:1.27-alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── Ollama local LLM (only with --profile local) ───────────────────────────
  ollama:
    image: ollama/ollama:latest
    profiles: ["local"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

    # ── NVIDIA GPU (uncomment to enable) ──────────────────────────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── One-shot model pull — run once after first `docker compose --profile local up`
  # Usage: docker compose --profile local run --rm model-init
  model-init:
    image: ollama/ollama:latest
    profiles: ["local"]
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama...' &&
        until curl -sf http://ollama:11434/api/tags > /dev/null; do sleep 2; done &&
        echo 'Pulling qwen2.5 (text)...' &&
        ollama pull qwen2.5 &&
        echo 'Pulling llava (vision)...' &&
        ollama pull llava &&
        echo 'Done — models ready.'
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama
    restart: "no"

volumes:
  app_data:
    driver: local
  ollama_data:
    driver: local
