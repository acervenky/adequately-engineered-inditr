server {
    listen 80;
    server_name _;

    # Allow large document uploads (PDFs, xlsx up to 50 MB)
    client_max_body_size 50M;

    # ── API proxy ─────────────────────────────────────────────────────────────
    # All backend routes proxied to the api container.
    location ~ ^/(session|health|docs|redoc|openapi\.json) {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Streaming-friendly timeouts for LLM calls (can be slow)
        proxy_read_timeout    300s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    300s;
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively; never cache the SPA shell
    location ~* \.(css|js|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
